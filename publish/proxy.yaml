  # ==========================================
  # 8. STEAM (STORE, MEDIA, COMMUNITY) - ПРОКСИ
  # ==========================================
  # Эти домены нужны для загрузки картинок, видео и работы магазина без задержек.

  # Магазин и авторизация
  - DOMAIN-SUFFIX,steampowered.com
  # Сообщество (Мастерская, профили, торговая площадка)
  - DOMAIN-SUFFIX,steamcommunity.com
  # Картинки, превью, видео на страницах игр
  - DOMAIN-SUFFIX,steamstatic.com
  - DOMAIN-SUFFIX,steamgames.com         # Часто используется как CDN для медиа
  # Аватарки и скриншоты пользователей
  - DOMAIN-SUFFIX,steamusercontent.com
  - DOMAIN-SUFFIX,steamuserimages.com
  # Чат и социальные функции
  - DOMAIN-SUFFIX,steam-chat.com
  # Внутренний браузер (отвечает за отрисовку магазина)
  - PROCESS-NAME-REGEX,(?i).*steamwebhelper.*

  # ==========================================
  # 9. DISCORD VOICE & UDP PORTS (FIX)
  # ==========================================
  # WebRTC / STUN (Связь для звонков)
  - DST-PORT,3478
  # Резервный диапазон Discord (новые серверы)
  - DST-PORT,19294-19344
  # ВАЖНО: Это правило должно быть в PROXY, чтобы обойти блокировку протоколов
  - DST-PORT,50000-65535

